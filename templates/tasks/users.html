{% extends "tasks/base.html" %}
{% load static %}
{% block content %}

<table class="table table-dark">
  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Age</th>
        <th scope="col">Photo</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
        <tr>
            <td>
                <a href="{% url 'user_tasks' user.id %}">{{ user.first_name }}</a>
            </td>
        </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
